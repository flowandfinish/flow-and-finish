*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:#2C2C2B;
  --linen:#F2EFE9;
  --linen-warm:#F9F1F0;
  --dust:#ede9e2;
  --stone:#888780;
  --stone-soft:#a8a59d;
  --blush:#D4b3ae;
  --sand:#d8d0c4;
  --font-serif:'Cormorant Garamond',serif;
  --font-sans:'Tenor Sans',sans-serif;
  --header-h:64px;
}

html{scroll-behavior:smooth;scroll-padding-top:var(--header-h);}
body{
  font-family:var(--font-sans);
  background:var(--linen);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ── motion ──────────────────────────────────────── */
@keyframes ffFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:ffFade 1.4s cubic-bezier(.22,.61,.36,1) both;}
.fade-d1{animation-delay:.15s;} .fade-d2{animation-delay:.30s;}

/* ── accessibility ───────────────────────────────── */
a:focus-visible,label:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:2px;}
.skip-link{position:absolute;left:-9999px;top:0;background:var(--ink);color:var(--linen);padding:10px 16px;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;z-index:200;}
.skip-link:focus{left:8px;top:8px;}

.nav-toggle-cb{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}

/* ════════════════════════ HEADER / NAV ════════════════════════ */
.site-header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--header-h);
  padding:0 clamp(1.25rem,4vw,3rem);
  background:rgba(242,239,233,.94);
  backdrop-filter:saturate(1.1) blur(6px);
  border-bottom:0.5px solid rgba(44,44,43,.1);
}
.wordmark{
  font-family:var(--font-serif);font-weight:300;
  font-size:clamp(1.05rem,1.6vw,1.4rem);letter-spacing:.1em;
  color:var(--ink);text-decoration:none;white-space:nowrap;
}
.primary-nav{display:none;align-items:center;gap:clamp(1.1rem,2vw,1.9rem);}
.primary-nav a{
  font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--stone-soft);text-decoration:none;white-space:nowrap;
  transition:color .5s cubic-bezier(.22,.61,.36,1);
}
.primary-nav a:hover,.primary-nav a.active{color:var(--ink);}
.connect-cta{
  display:none;
  font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;
  background:var(--linen-warm);border:0.5px solid var(--sand);
  color:var(--ink);text-decoration:none;padding:.55rem .95rem;
  transition:all .5s cubic-bezier(.22,.61,.36,1);
}
.connect-cta:hover{background:#fff;letter-spacing:.28em;}
.nav-toggle{
  display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;cursor:pointer;color:var(--ink);font-size:1.25rem;
}
.nav-toggle .icon-close{display:none;}
.nav-toggle-cb:checked ~ .site-header .nav-toggle .icon-open{display:none;}
.nav-toggle-cb:checked ~ .site-header .nav-toggle .icon-close{display:inline;}

.mobile-nav{
  display:none;flex-direction:column;
  background:var(--linen-warm);
  border-bottom:0.5px solid rgba(44,44,43,.1);
  padding:.5rem 0;
}
.nav-toggle-cb:checked ~ .mobile-nav{display:flex;}
.mobile-nav a{
  font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink);text-decoration:none;
  padding:.85rem clamp(1.25rem,4vw,3rem);
  border-top:0.5px solid rgba(44,44,43,.06);
}
.mobile-nav a:first-child{border-top:none;}
